<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .customize-overlay {
            display: none;
        }

        .customize-overlay.active {
            display: flex;
        }
    </style>
</head>

<body class="bg-gray-50 text-slate-600 font-light flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-200/60 h-full shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <div class="flex items-center gap-2">
                <div
                    class="w-7 h-7 rounded-lg bg-gradient-to-br from-orange-500 to-orange-600 flex items-center justify-center text-white shadow-md shadow-orange-500/20">
                    <span class="font-medium text-sm">F</span>
                </div>
                <span class="text-lg font-medium tracking-tight text-gray-900">Finance</span>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-1">
            <a href="/"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 text-sm font-medium">
                <iconify-icon icon="solar:widget-5-linear" width="20"></iconify-icon> Dashboard
            </a>
            <a href="/transactions.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 text-sm transition-colors">
                <iconify-icon icon="solar:transfer-horizontal-linear" width="20"></iconify-icon> Transactions
            </a>
            <a href="/recurring.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 text-sm transition-colors">
                <iconify-icon icon="solar:calendar-linear" width="20"></iconify-icon> Recurring
            </a>
            <a href="/upload.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 text-sm transition-colors">
                <iconify-icon icon="solar:upload-linear" width="20"></iconify-icon> Upload
            </a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <div id="sidebar-user" class="flex items-center gap-3 px-2 py-2">
                <div
                    class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 text-xs font-medium">
                    U</div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate" id="sidebar-username">User</p>
                    <p class="text-xs text-gray-500 truncate" id="sidebar-role">Role</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto">
        <div class="max-w-6xl mx-auto p-4 md:p-8">
            <!-- Header -->
            <header class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-2xl md:text-3xl font-medium text-gray-900 tracking-tight">Dashboard</h1>
                    <p class="text-sm text-gray-500 mt-1">Your financial overview</p>
                </div>
                <div class="flex items-center gap-3">
                    <button id="customize-btn"
                        class="px-4 py-2 bg-white border border-gray-200 text-gray-700 text-sm font-medium rounded-xl hover:bg-gray-50 transition-colors flex items-center gap-2">
                        <iconify-icon icon="solar:settings-linear" width="16"></iconify-icon> Customize
                    </button>
                    <button id="logout-btn"
                        class="px-4 py-2 bg-gray-900 text-white text-sm font-medium rounded-xl hover:bg-gray-800 transition-colors shadow-sm">
                        Logout
                    </button>
                </div>
            </header>

            <!-- Widget Container -->
            <div id="widget-container"></div>
        </div>
    </main>

    <!-- Customize Panel Overlay -->
    <div id="customize-overlay" class="customize-overlay fixed inset-0 bg-black/50 z-50 items-center justify-center">
        <div class="bg-white rounded-2xl p-8 w-[420px] max-w-[90vw] max-h-[80vh] overflow-y-auto shadow-2xl">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-lg font-medium text-gray-900">Customize Dashboard</h2>
                <button id="customize-close"
                    class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors">✕</button>
            </div>
            <p class="text-xs text-gray-500 mb-5">Toggle widgets on/off and drag to reorder.</p>
            <div id="widget-config-list" class="space-y-2"></div>
            <div class="flex gap-3 mt-6">
                <button id="config-save"
                    class="flex-1 py-2.5 bg-gray-900 text-white text-sm font-medium rounded-xl hover:bg-gray-800 transition-colors">Save
                    Layout</button>
                <button id="config-reset"
                    class="flex-1 py-2.5 bg-white border border-gray-200 text-gray-700 text-sm font-medium rounded-xl hover:bg-gray-50 transition-colors">Reset</button>
            </div>
        </div>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav
        class="md:hidden fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-200/60 z-50 px-6 py-3 flex justify-around items-center">
        <a href="/" class="flex flex-col items-center gap-1 text-orange-600">
            <iconify-icon icon="solar:widget-5-bold" width="22"></iconify-icon>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="/transactions.html" class="flex flex-col items-center gap-1 text-gray-400">
            <iconify-icon icon="solar:transfer-horizontal-linear" width="22"></iconify-icon>
            <span class="text-[10px] font-medium">Transactions</span>
        </a>
        <a href="/upload.html" class="flex flex-col items-center gap-1 text-gray-400">
            <iconify-icon icon="solar:upload-linear" width="22"></iconify-icon>
            <span class="text-[10px] font-medium">Upload</span>
        </a>
    </nav>

    <script src="/static/js/dashboard.js"></script>
</body>

</html>
