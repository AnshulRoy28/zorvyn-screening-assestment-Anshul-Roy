<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-3xl p-8 shadow-xl shadow-gray-200/40 border border-gray-100">
            <div class="flex items-center justify-center gap-2 mb-8">
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-orange-500 to-orange-600 flex items-center justify-center text-white shadow-md shadow-orange-500/20">
                    <span class="font-medium text-sm">F</span>
                </div>
                <span class="text-xl font-medium tracking-tight text-gray-900">Finance Tracker</span>
            </div>

            <h2 class="text-2xl font-medium text-gray-900 tracking-tight mb-2 text-center">Welcome back</h2>
            <p class="text-sm text-gray-500 text-center mb-8">Sign in to your account</p>

            <form id="login-form" class="space-y-5">
                <div class="space-y-2">
                    <label class="text-xs font-medium text-gray-700">Email</label>
                    <input type="email" id="email" required
                        class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl px-4 py-3 focus:outline-none focus:bg-white focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all"
                        placeholder="you@example.com">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-medium text-gray-700">Password</label>
                    <input type="password" id="password" required
                        class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-xl px-4 py-3 focus:outline-none focus:bg-white focus:border-orange-500 focus:ring-1 focus:ring-orange-500 transition-all"
                        placeholder="••••••••">
                </div>
                <button type="submit"
                    class="w-full py-3 bg-gray-900 text-white text-sm font-medium rounded-xl hover:bg-gray-800 transition-colors shadow-sm">
                    Sign In
                </button>
                <div id="error"
                    class="hidden text-sm text-red-600 bg-red-50 border border-red-100 rounded-xl p-3 text-center">
                </div>
            </form>

            <p class="text-center mt-6 text-sm text-gray-500">
                Don't have an account? <a href="/signup.html"
                    class="text-orange-600 font-medium hover:text-orange-700">Sign Up</a>
            </p>
            <p class="text-center mt-3 text-xs text-gray-400">
                Demo: admin@demo.com / password123
            </p>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error');
            errorEl.classList.add('hidden');

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('token', result.data.token);
                    window.location.href = '/';
                } else {
                    errorEl.textContent = result.error;
                    errorEl.classList.remove('hidden');
                }
            } catch (error) {
                errorEl.textContent = 'Login failed: ' + error.message;
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
