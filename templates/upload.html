<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - Upload</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Finance Tracker</h1>
            <nav>
                <a href="/">Dashboard</a>
                <a href="/transactions.html">Transactions</a>
                <a href="/upload.html">Upload</a>
                <button id="logout-btn">Logout</button>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2>Upload Transactions</h2>
            
            <div class="tabs">
                <button class="tab active" data-tab="receipt">Receipt</button>
                <button class="tab" data-tab="bank">Bank Statement</button>
                <button class="tab" data-tab="excel">Excel</button>
                <button class="tab" data-tab="manual">Manual Entry</button>
            </div>

            <div id="receipt-tab" class="tab-content">
                <div class="upload-zone" id="receipt-zone">
                    <p>Drag and drop receipt image or click to select</p>
                    <input type="file" id="receipt-file" accept="image/*" style="display: none;">
                </div>
            </div>

            <div id="bank-tab" class="tab-content" style="display: none;">
                <div class="upload-zone" id="bank-zone">
                    <p>Drag and drop bank statement image or click to select</p>
                    <input type="file" id="bank-file" accept="image/*" style="display: none;">
                </div>
            </div>

            <div id="excel-tab" class="tab-content" style="display: none;">
                <div class="upload-zone" id="excel-zone">
                    <p>Drag and drop Excel file or click to select</p>
                    <input type="file" id="excel-file" accept=".xlsx,.xls" style="display: none;">
                </div>
            </div>

            <div id="manual-tab" class="tab-content" style="display: none;">
                <form id="manual-form">
                    <div class="form-group">
                        <label>Item Name</label>
                        <input type="text" id="item-name" required>
                    </div>
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="amount" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category" required>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Health">Health</option>
                            <option value="Income">Income</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="type" required>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Transaction</button>
                </form>
            </div>

            <div id="message" class="success" style="display: none;"></div>
            <div id="error" class="error" style="display: none;"></div>
        </div>

        <div id="preview-card" class="card" style="display: none;">
            <h2>Preview Transactions</h2>
            <table id="preview-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <button id="confirm-btn" class="btn btn-primary">Confirm & Save</button>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">Processing your file...</div>
        </div>
    </div>

    <script src="/static/js/upload.js"></script>
</body>
</html>
