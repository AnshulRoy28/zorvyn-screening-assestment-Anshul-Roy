<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-slate-600 font-light flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-200/60 h-full shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-gray-100">
            <div class="flex items-center gap-2">
                <div
                    class="w-7 h-7 rounded-lg bg-gradient-to-br from-orange-500 to-orange-600 flex items-center justify-center text-white shadow-md shadow-orange-500/20">
                    <span class="font-medium text-sm">F</span>
                </div>
                <span class="text-lg font-medium tracking-tight text-gray-900">Finance</span>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-1">
            <a href="/"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 text-sm transition-colors">
                <iconify-icon icon="solar:widget-5-linear" width="20"></iconify-icon> Dashboard
            </a>
            <a href="/transactions.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-orange-50 text-orange-600 text-sm font-medium">
                <iconify-icon icon="solar:transfer-horizontal-linear" width="20"></iconify-icon> Transactions
            </a>
            <a href="/recurring.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 text-sm transition-colors">
                <iconify-icon icon="solar:calendar-linear" width="20"></iconify-icon> Recurring
            </a>
            <a href="/upload.html"
                class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 text-sm transition-colors">
                <iconify-icon icon="solar:upload-linear" width="20"></iconify-icon> Upload
            </a>
        </nav>
        <div class="p-4 border-t border-gray-100">
            <div class="flex items-center gap-3 px-2 py-2">
                <div
                    class="w-8 h-8 rounded-full bg-orange-100 flex items-center justify-center text-orange-600 text-xs font-medium">
                    U</div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-gray-900 truncate">User</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto pb-20 md:pb-0">
        <div class="max-w-6xl mx-auto p-4 md:p-8">
            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-2xl md:text-3xl font-medium text-gray-900 tracking-tight">Transactions</h1>
                    <p class="text-sm text-gray-500 mt-1">View and manage your activity</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex gap-2">
                        <button id="export-csv-btn"
                            class="px-3 py-2 bg-white border border-gray-200 text-gray-700 text-sm rounded-xl hover:bg-gray-50 transition-colors flex items-center gap-2">
                            <iconify-icon icon="solar:document-text-linear" width="16"></iconify-icon> CSV
                        </button>
                        <button id="export-json-btn"
                            class="px-3 py-2 bg-white border border-gray-200 text-gray-700 text-sm rounded-xl hover:bg-gray-50 transition-colors flex items-center gap-2">
                            <iconify-icon icon="solar:code-linear" width="16"></iconify-icon> JSON
                        </button>
                    </div>
                    <button id="logout-btn"
                        class="px-4 py-2 bg-gray-900 text-white text-sm font-medium rounded-xl hover:bg-gray-800 transition-colors shadow-sm">
                        Logout
                    </button>
                </div>
            </div>

            <!-- Filters -->
            <div class="flex flex-col md:flex-row gap-3 mb-6">
                <div class="relative">
                    <select id="filter-category"
                        class="appearance-none bg-white border border-gray-200 text-gray-700 text-sm rounded-xl px-4 py-2.5 pr-10 focus:outline-none focus:border-orange-500 w-full md:w-auto">
                        <option value="">All Categories</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Health">Health</option>
                        <option value="Income">Income</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="relative">
                    <select id="filter-type"
                        class="appearance-none bg-white border border-gray-200 text-gray-700 text-sm rounded-xl px-4 py-2.5 pr-10 focus:outline-none focus:border-orange-500 w-full md:w-auto">
                        <option value="">All Types</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <select id="sort-by"
                    class="appearance-none bg-white border border-gray-200 text-gray-700 text-sm rounded-xl px-4 py-2.5 pr-10 focus:outline-none focus:border-orange-500 w-full md:w-auto">
                    <option value="date-desc">Date (Newest)</option>
                    <option value="date-asc">Date (Oldest)</option>
                    <option value="amount-desc">Amount (High-Low)</option>
                    <option value="amount-asc">Amount (Low-High)</option>
                </select>
                <input type="date" id="filter-start"
                    class="bg-white border border-gray-200 text-gray-700 text-sm rounded-xl px-4 py-2.5 focus:outline-none focus:border-orange-500 w-full md:w-auto">
                <input type="date" id="filter-end"
                    class="bg-white border border-gray-200 text-gray-700 text-sm rounded-xl px-4 py-2.5 focus:outline-none focus:border-orange-500 w-full md:w-auto">
                <button id="apply-filters"
                    class="px-4 py-2.5 bg-orange-500 text-white text-sm font-medium rounded-xl hover:bg-orange-600 transition-colors shadow-sm">
                    Apply
                </button>
            </div>

            <!-- Table -->
            <div class="bg-white border border-gray-200/80 rounded-2xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table id="transactions-table" class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="bg-gray-50/50 border-b border-gray-100 text-xs text-gray-500">
                            <tr>
                                <th class="px-6 py-4 font-medium">Date</th>
                                <th class="px-6 py-4 font-medium">Item</th>
                                <th class="px-6 py-4 font-medium">Category</th>
                                <th class="px-6 py-4 font-medium text-right">Amount</th>
                                <th class="px-6 py-4 font-medium">Type</th>
                                <th class="px-6 py-4 font-medium">Source</th>
                                <th class="px-6 py-4 font-medium">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav
        class="md:hidden fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-200/60 z-50 px-6 py-3 flex justify-around items-center">
        <a href="/" class="flex flex-col items-center gap-1 text-gray-400">
            <iconify-icon icon="solar:widget-5-linear" width="22"></iconify-icon>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a href="/transactions.html" class="flex flex-col items-center gap-1 text-orange-600">
            <iconify-icon icon="solar:transfer-horizontal-bold" width="22"></iconify-icon>
            <span class="text-[10px] font-medium">Transactions</span>
        </a>
        <a href="/upload.html" class="flex flex-col items-center gap-1 text-gray-400">
            <iconify-icon icon="solar:upload-linear" width="22"></iconify-icon>
            <span class="text-[10px] font-medium">Upload</span>
        </a>
    </nav>

    <script src="/static/js/transactions.js"></script>
</body>

</html>
